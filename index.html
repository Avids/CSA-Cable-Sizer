<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feeder List Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Project Feeder List Builder</h1>
    <p>Create, save, load, and export project feeder schedules.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Project Details</h2>
      <div class="grid two-col">
        <div class="field">
          <label for="project-name">Project Name <span class="required">*</span></label>
          <input id="project-name" type="text" placeholder="e.g., Building A Expansion" required>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Panel / Equipment List</h2>
      <div class="grid two-col align-end">
        <div class="field">
          <label for="equipment-name">Panel or Equipment Name</label>
          <input id="equipment-name" type="text" placeholder="e.g., MSB-1, MCC-2, Chiller-01">
        </div>
        <button id="btn-add-equipment" class="btn primary" type="button">Add Equipment</button>
      </div>
      <ul id="equipment-list" class="pill-list"></ul>
    </section>

    <section class="card">
      <h2>Add Feeder</h2>
      <div class="grid three-col">
        <div class="field">
          <label for="feeder-id">Feeder ID</label>
          <input id="feeder-id" type="text" placeholder="e.g., F-001">
        </div>
        <div class="field">
          <label for="from-equipment">From <span class="required">*</span></label>
          <select id="from-equipment"></select>
        </div>
        <div class="field">
          <label for="to-equipment">To <span class="required">*</span></label>
          <select id="to-equipment"></select>
        </div>
      </div>

      <div class="grid three-col">
        <div class="field">
          <label for="voltage">Voltage (V)</label>
          <input id="voltage" type="number" min="1" step="1" placeholder="600">
        </div>
        <div class="field">
          <label for="current">Current (A)</label>
          <input id="current" type="number" min="0" step="0.1" placeholder="250">
        </div>
        <div class="field">
          <label for="phases">Phases</label>
          <select id="phases">
            <option value="1Ø">1Ø</option>
            <option value="3Ø" selected>3Ø</option>
          </select>
        </div>
      </div>

      <div class="grid three-col">
        <div class="field">
          <label for="conductor">Conductor</label>
          <input id="conductor" type="text" placeholder="e.g., 3C #500 kcmil Cu + #1/0 G">
        </div>
        <div class="field">
          <label for="length">Length (m)</label>
          <input id="length" type="number" min="0" step="0.1" placeholder="95">
        </div>
        <div class="field">
          <label for="conduit">Conduit / Install Method</label>
          <input id="conduit" type="text" placeholder="e.g., 100 mm PVC, Tray">
        </div>
      </div>

      <div class="field">
        <label for="feeder-notes">Notes</label>
        <textarea id="feeder-notes" rows="2" placeholder="Optional design or installation notes."></textarea>
      </div>

      <button id="btn-add-feeder" class="btn primary" type="button">Add Feeder to List</button>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Feeder List</h2>
        <span id="feeder-count" class="muted">0 feeders</span>
      </div>
      <div class="table-wrap">
        <table id="feeder-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Feeder ID</th>
              <th>From</th>
              <th>To</th>
              <th>V</th>
              <th>A</th>
              <th>Phases</th>
              <th>Conductor</th>
              <th>Length (m)</th>
              <th>Conduit</th>
              <th>Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="feeder-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Project Actions</h2>
      <div class="actions">
        <button id="btn-save-project" class="btn">Save Project (JSON)</button>
        <button id="btn-load-project" class="btn">Load Project (JSON)</button>
        <button id="btn-export-pdf" class="btn">Export PDF</button>
        <button id="btn-export-excel" class="btn">Export Excel</button>
        <button id="btn-clear-project" class="btn danger">Clear All</button>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/exporters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
